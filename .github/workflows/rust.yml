name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest

    runs-on: ${{ matrix.platform.os }}

    steps:
      - uses: actions/checkout@v6
      - name: Install minimal stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Build
        run: cargo build --locked
      - name: Run tests
        run: cargo test --locked

  wasm32-wasip1:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install wasmtime
        uses: taiki-e/install-action@v2
        with:
          tool: wasmtime
      - name: Run WASM tests
        run: cargo test --locked --target wasm32-wasip1

  wasm32-unknown-unknown:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Build for wasm32-unknown-unknown
        run: cargo build --locked --target wasm32-unknown-unknown

  lint:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Dwarnings"
    steps:
      - uses: actions/checkout@v6
      - name: Install stable with clippy and rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Run Clippy
        run: cargo clippy --locked --color always --all-targets --all-features
      - name: Run fmt check
        run: cargo fmt --all --check -- --color=always

  doc:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Build docs
        run: cargo doc --locked --no-deps --all-features
